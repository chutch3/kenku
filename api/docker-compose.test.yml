services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kenku
      POSTGRES_PASSWORD: kenku_test
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kenku"]
      interval: 5s
      timeout: 5s
      retries: 5
