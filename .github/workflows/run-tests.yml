name: Unit Tests

on:
  push:
    paths:
      - "api/**"
      - ".github/workflows/run-tests.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore ./Tranga.sln

      - name: Build the solution
        run: dotnet build ./Tranga.sln --configuration Release --no-restore -p:DisableOpenApiGeneration=true -m:1

      - name: Run unit tests with report
        run: dotnet test ./Tests/Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=TestResults.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v6
        with:
          name: TestResults
          path: ./api/Tests/TestResults/TestResults.trx
