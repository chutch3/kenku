version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  # .NET backend
  - package-ecosystem: "nuget"
    directory: "/api/API"
    schedule:
      interval: "weekly"

  # Nuxt frontend
  - package-ecosystem: "npm"
    directory: "/web/website"
    schedule:
      interval: "weekly"
